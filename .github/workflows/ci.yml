name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macOS runner: macmail is a macOS tool — the build codesigns the binary and
    # tests/osascript.test.ts shells out to `osascript`. (Free for public repos.)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test (CI tier — fixtures only; tests/local is excluded)
        run: bun run test

      - name: Build + codesign the binary
        run: bun run build

      - name: Smoke test the compiled binary
        run: bash tests/smoke.sh
